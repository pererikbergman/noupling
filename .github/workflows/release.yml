name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: noupling-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: noupling-macos-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: noupling-macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: noupling-windows-x86_64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Rename binary
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/${{ matrix.target }}/release/noupling.exe ${{ matrix.artifact }}
          else
            cp target/${{ matrix.target }}/release/noupling ${{ matrix.artifact }}
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            noupling-linux-x86_64
            noupling-macos-aarch64
            noupling-macos-x86_64
            noupling-windows-x86_64.exe
          generate_release_notes: true
