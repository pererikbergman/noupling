# Reusable workflow: noupling PR comment
# Copy this file to your project's .github/workflows/ directory.
#
# Usage in your repo:
#   .github/workflows/noupling.yml (copy this file)
#
# Required: noupling must be installed (cargo install or prebuilt binary)

name: noupling PR Check

on:
  pull_request:
    branches: [main, master]

jobs:
  noupling:
    name: Architecture Audit
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Need full history for diff-base

      - name: Install noupling
        run: |
          curl -sL "https://github.com/pererikbergman/noupling/releases/latest/download/noupling-linux-x86_64" -o noupling
          chmod +x noupling
          sudo mv noupling /usr/local/bin/

      - name: Full scan
        run: noupling scan .

      - name: Diff scan against base
        run: |
          noupling scan . --diff-base origin/${{ github.base_ref }}

      - name: Generate report
        id: audit
        run: |
          # Full audit for overall score
          FULL_OUTPUT=$(noupling audit . 2>&1 || true)
          SCORE=$(echo "$FULL_OUTPUT" | grep "Health Score" | sed 's/Health Score: \(.*\)\/100/\1/')
          VIOLATIONS=$(echo "$FULL_OUTPUT" | grep "Violations:" | sed 's/Violations: //')

          # Diff audit for new violations only
          noupling scan . --diff-base origin/${{ github.base_ref }}
          DIFF_OUTPUT=$(noupling audit . 2>&1 || true)
          NEW_VIOLATIONS=$(echo "$DIFF_OUTPUT" | grep "Violations:" | sed 's/Violations: //')

          echo "score=$SCORE" >> $GITHUB_OUTPUT
          echo "violations=$VIOLATIONS" >> $GITHUB_OUTPUT
          echo "new_violations=$NEW_VIOLATIONS" >> $GITHUB_OUTPUT

          # Save full diff output for comment
          echo "$DIFF_OUTPUT" > /tmp/noupling-diff.txt

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const score = '${{ steps.audit.outputs.score }}';
            const violations = '${{ steps.audit.outputs.violations }}';
            const newViolations = '${{ steps.audit.outputs.new_violations }}';
            const diffOutput = fs.readFileSync('/tmp/noupling-diff.txt', 'utf8');

            // Build violation details (match severity like [0.33] but not hotspots like [12 in,])
            let details = '';
            const lines = diffOutput.split('\n');
            const violationLines = lines.filter(l => /^\s+\[\d+\.\d+\]/.test(l));
            if (violationLines.length > 0) {
              details = '\n\n### New Violations\n\n```\n' + violationLines.join('\n') + '\n```';
            }

            const body = `## noupling Architecture Report

            | Metric | Value |
            | :--- | :--- |
            | Health Score | ${score}/100 |
            | Total Violations | ${violations} |
            | New in this PR | ${newViolations} |
            ${details}

            ---
            *Generated by [noupling](https://github.com/pererikbergman/noupling)*`;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('noupling Architecture Report'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

      - name: Fail on threshold
        if: always()
        run: |
          # Fail if score below 80 (customize this threshold)
          noupling scan .
          noupling audit . --fail-below 80
